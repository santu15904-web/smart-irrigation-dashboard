<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Irrigation</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Moisture Card -->

    <div class="moisture-card">

        <h1>
            <span id="emoji">😊</span>
            <span id="moisture">--%</span>
        </h1>

        <p>Soil Moisture</p>

    </div>

    <!-- Status + Controls -->

    <div class="status-grid">

        <div class="status-card">
            <h3 id="pump">OFF</h3>
            <p>Pump</p>
        </div>

        <div class="status-card">
            <h3 id="mode">AUTO</h3>
            <p>Mode</p>
        </div>

        <div class="status-card">
            <h3 id="state">IDLE</h3>
            <p>State</p>
        </div>

        <div class="status-card">

            <p><b>Controls</b></p>

            <button onclick="pumpOn()">ON</button>
            <button onclick="pumpOff()">OFF</button>

            <br>

            <button onclick="autoMode()">AUTO</button>
            <button onclick="manualMode()">MANUAL</button>

        </div>

    </div>

    <!-- Chart -->

    <h3>📈 Moisture Trend</h3>

    <canvas id="moistureChart"></canvas>

    <!-- Table -->

    <h3>📋 Recent Samples</h3>

    <div class="table-card">

        <table id="samplesTable">

            <thead>
                <tr>
                    <th>Time</th>
                    <th>Moisture</th>
                    <th>Raw</th>
                    <th>Filtered</th>
                    <th>Pump</th>
                    <th>Mode</th>
                </tr>
            </thead>

            <tbody id="samplesBody">

                <tr>
                    <td colspan="6">
                        Waiting for data...
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="script.js"></script>

</body>
</html>
